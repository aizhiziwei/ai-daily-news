# The Site Configuration
theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: AI Daily News
tagline: "每日全球 AI 与科技前沿资讯精选"

description: >-
  每日精选全球 AI 与科技前沿资讯，由 AI 编辑团队从海外一手技术社区筛选、提炼、解读。
  不追热点，只追真正影响行业的信号。智子位出品。

url: "https://aizhiziwei.github.io"
baseurl: "/ai-daily-news"

github:
  username: aizhiziwei

social:
  name: 智子位
  links:
    - https://github.com/aizhiziwei

avatar: /assets/logo.png

toc: true

comments:
  provider:

paginate: 10

webmaster_verifications:
  google:
  bing:
  baidu:

theme_mode:

pwa:
  enabled: true
  cache:
    enabled: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order
